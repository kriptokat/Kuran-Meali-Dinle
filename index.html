<style>

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #02040a;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }

  /* Gelişmiş Neon Arkaplan (hareketli yıldızımsı noktalar) */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.08) 0%, transparent 25%),
      radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.08) 0%, transparent 30%),
      radial-gradient(circle at 40% 80%, rgba(100, 0, 255, 0.05) 0%, transparent 35%),
      repeating-linear-gradient(45deg, rgba(0, 255, 255, 0.02) 0px, rgba(0, 255, 255, 0.02) 2px, transparent 2px, transparent 12px);
    pointer-events: none;
    z-index: 0;
  }

  /* ekstra neon parıltılar (statik) */
  body::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, rgba(0, 255, 255, 0.02) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 420px;
    width: 100%;
    background: rgba(5, 10, 18, 0.7);
    backdrop-filter: blur(25px);
    -webkit-backdrop-filter: blur(25px);
    border-radius: 28px;
    border: 1px solid rgba(0, 255, 255, 0.35);         /* daha belirgin neon çizgi */
    box-shadow: 
      0 20px 40px rgba(0, 0, 0, 0.9),
      0 0 0 1px rgba(0, 255, 255, 0.2) inset,
      0 0 40px rgba(0, 180, 255, 0.4),                /* dışarı taşan neon */
      0 0 15px rgba(0, 255, 255, 0.3);                 /* ekstra glow */
    padding: 10px; /* 18px'den 10px'e düşürüldü - container genel yukarı taşındı */
    position: relative;
    z-index: 2;
    transition: box-shadow 0.2s ease;
  }

  /* container hover da neon şiddetlensin */
  .container:hover {
    box-shadow: 
      0 20px 40px rgba(0, 0, 0, 0.9),
      0 0 0 1px rgba(0, 255, 255, 0.3) inset,
      0 0 50px rgba(0, 200, 255, 0.6),
      0 0 20px #0ff;
  }

  .title-section {
    text-align: center;
    margin-bottom: 18px;
    filter: drop-shadow(0 0 8px cyan);
  }

  .bismillah {
    font-family: 'Inter', serif;
    font-size: 1.7rem; /* 2rem'den 1.7rem'e düşürüldü - 3 punto küçültüldü */
    color: #fff;
    text-shadow: 
      0 0 15px cyan,
      0 0 30px #0ff,
      0 0 60px #00aaff;
    margin-bottom: 8px;
    letter-spacing: 0.02em;
    font-weight: 400;
    animation: neonPulse 3s infinite alternate;
  }

  h1 {
    font-size: 0.85rem;
    font-weight: 400;
    color: rgba(180, 255, 255, 0.9);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 0 5px #0ff, 0 0 10px #0ff;
  }

  /* player kısmı neon border belirgin */
  .player-section {
    background: rgba(0, 5, 12, 0.6);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(0, 230, 255, 0.5);
    border-radius: 24px;
    padding: 18px 20px; /* padding artırıldı */
    margin-bottom: 14px;
    box-shadow: 
      0 8px 16px rgba(0, 0, 0, 0.7),
      0 0 0 1px rgba(0, 255, 255, 0.2) inset,
      0 0 20px rgba(0, 200, 255, 0.3);
  }

  .now-playing-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 18px;
  }

  .track-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .playing-dot {
    width: 6px;
    height: 6px;
    background: #0ff;
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 12px #0ff, 0 0 20px #0ff;
    flex-shrink: 0;
    animation: pulse 1s ease-in-out infinite;
  }

  .playing-dot.visible {
    display: inline-block;
  }

  .now-playing-title {
    font-size: 1.1rem;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 10px cyan, 0 0 20px #0ff;
    letter-spacing: 0.02em;
  }

  .now-playing-meta {
    font-size: 0.7rem;
    color: #8cf;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
    text-shadow: 0 0 5px cyan;
  }

  .player-controls-row {
    display: flex;
    align-items: center;
    gap: 18px;
  }

  .progress-area {
    flex: 1;
  }

  .progress-container {
    position: relative;
    height: 6px;
    background: rgba(20, 40, 60, 0.6);
    border-radius: 3px;
    cursor: pointer;
    margin-bottom: 8px;
    overflow: hidden;
    box-shadow: 0 0 8px #0ff;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0ff, #a0f, #0ff);
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 15px #0ff, 0 0 30px #0ff;
    position: relative;
    background-size: 200% 100%;
    animation: neonWave 3s linear infinite;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 4px;
    background: #fff;
    box-shadow: 0 0 15px #fff, 0 0 30px #0ff;
  }

  @keyframes neonWave {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.7rem;
    color: #8cf;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 0 5px #0ff;
    font-weight: 500;
  }

  .control-buttons {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .ctrl-btn {
    background: transparent;
    border: none;
    color: #8cf;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 1.1rem;
    text-shadow: 0 0 5px cyan;
  }

  .ctrl-btn:hover {
    color: #fff;
    text-shadow: 0 0 20px cyan, 0 0 30px #0ff;
    transform: scale(1.15);
  }

  .play-btn {
    width: 42px;
    height: 42px;
    color: #fff;
    font-size: 1.2rem;
    background: rgba(0, 200, 255, 0.15);
    border: 1px solid #0ff;
    box-shadow: 0 0 20px #0ff;
  }

  .play-btn:hover {
    background: rgba(0, 255, 255, 0.3);
    border-color: #fff;
    box-shadow: 0 0 30px cyan, 0 0 60px #0ff;
  }

  /* sure listesi neon border */
  .sureler-section {
    background: rgba(0, 8, 16, 0.6);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(0, 255, 255, 0.35);
    border-radius: 22px;
    padding: 14px;
    box-shadow: 
      0 8px 16px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(0, 255, 255, 0.1) inset,
      0 0 30px rgba(0, 200, 255, 0.2);
    margin-top: 0; /* Varsayılan margin varsa sıfırlandı */
  }

  .sureler-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 10px 10px 10px;
    color: #9cf;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0, 255, 255, 0.3);
    margin-bottom: 10px;
    text-shadow: 0 0 5px cyan;
  }

  .track-list {
    max-height: 240px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .track-list::-webkit-scrollbar {
    width: 3px;
  }
  .track-list::-webkit-scrollbar-track {
    background: rgba(0, 200, 255, 0.1);
    box-shadow: 0 0 5px #0ff inset;
  }
  .track-list::-webkit-scrollbar-thumb {
    background: #0ff;
    border-radius: 3px;
    box-shadow: 0 0 10px #0ff;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    cursor: pointer;
    border-radius: 14px;
    transition: all 0.2s ease;
    font-size: 0.9rem;
    color: rgba(220, 255, 255, 0.8);
    border: 1px solid transparent;
    margin-bottom: 2px;
    position: relative; /* Progress bar için relative konumlandırma */
    overflow: hidden; /* Progress bar taşmasını engellemek için */
  }

  /* Yükleme progress barı - sadece aktif öğede gösterilecek */
  .track-progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 3px;
    width: 0%;
    background: linear-gradient(90deg, #0ff, #a0f);
    box-shadow: 0 0 10px #0ff;
    transition: width 0.1s linear;
    border-radius: 0 0 0 14px; /* Alt köşeleri yuvarla */
    z-index: 1;
  }

  .track-item:hover {
    background: rgba(0, 255, 255, 0.1);
    border-color: #0ff;
    box-shadow: 0 0 15px #0ff;
    color: #fff;
    text-shadow: 0 0 8px #0ff;
  }

  .track-item.active {
    /* background: rgba(0, 230, 255, 0.15);  -> Arkaplan rengi tamamen kaldırıldı */
    border-color: #0ff;
    box-shadow: 0 0 20px cyan;
  }

  .track-num {
    width: 26px;
    color: #0ff;
    font-size: 0.75rem;
    font-variant-numeric: tabular-nums;
    text-align: center;
    text-shadow: 0 0 5px #0ff;
    z-index: 2; /* Progress bar'ın üstünde kalması için */
    position: relative;
  }

  .track-item.active .track-num {
    display: none;
  }

  .track-icon {
    width: 26px;
    color: #0ff;
    font-size: 0.7rem;
    display: none;
    text-shadow: 0 0 12px #0ff, 0 0 20px #0ff;
    z-index: 2; /* Progress bar'ın üstünde kalması için */
    position: relative;
  }

  .track-item.active .track-icon {
    display: block;
    animation: iconPulse 1s infinite alternate;
  }

  /* Yükleme sırasında ikon dönsün */
  .track-icon.loading {
    animation: spin 1s linear infinite;
  }

  @keyframes spin {
    from { transform: rotate(0deg); }
    to { transform: rotate(360deg); }
  }

  @keyframes iconPulse {
    from { opacity: 0.8; text-shadow: 0 0 5px cyan; }
    to { opacity: 1; text-shadow: 0 0 20px cyan, 0 0 40px #0ff; }
  }

  .track-name {
    flex: 1;
    color: rgba(255, 255, 255, 0.8);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 0.9rem;
    z-index: 2; /* Progress bar'ın üstünde kalması için */
    position: relative;
  }

  .track-item.active .track-name {
    color: #fff;
    text-shadow: 0 0 12px cyan, 0 0 25px #0ff;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 10px #0ff; }
    50% { opacity: 0.3; box-shadow: 0 0 20px #0ff; }
  }

  @keyframes neonPulse {
    0% { text-shadow: 0 0 5px cyan, 0 0 15px #0ff; }
    100% { text-shadow: 0 0 20px cyan, 0 0 40px #0ff, 0 0 80px #00aaff; }
  }

  .glow-text {
    color: #bdf;
    font-size: 0.9rem; /* 0.7rem'den 0.9rem'e çıkarıldı - 2 punto büyütüldü */
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.15em;
    opacity: 0.9;
    text-shadow: 0 0 10px cyan, 0 0 20px #0ff;
  }

  /* Ekstra neon çizgi animasyonu */
  .container::before {
    content: '';
    position: absolute;
    top: -2px; left: -2px; right: -2px; bottom: -2px;
    background: linear-gradient(45deg, #0ff, #90f, #0ff, #90f);
    background-size: 300% 300%;
    border-radius: 30px;
    z-index: -1;
    opacity: 0;
    transition: opacity 0.4s;
    filter: blur(6px);
  }

  .container:hover::before {
    opacity: 0.3;
    animation: borderGlow 6s ease infinite;
  }

  @keyframes borderGlow {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }
</style>
</head>

<div class="container">
  <!-- BAŞLIK - DÜZENLENDİ: sadece tam besmele, "KURAN MEALİ · AHMET DENİZ" kaldırıldı -->
  <div class="title-section">
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَٰنِ الرَّحِيمِ</div>
    <!-- h1 tamamen kaldırıldı -->
  </div>

  <!-- OYNATICI -->
  <div class="player-section">
    <div class="now-playing-row">
      <div class="track-info">
        <span class="playing-dot" id="playingDot"></span>
        <div class="now-playing-title" id="nowTitle">—</div>
      </div>
      <div class="now-playing-meta" id="nowMeta"></div>
    </div>

    <div class="player-controls-row">
      <div class="progress-area">
        <div class="progress-container" id="progressContainer">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="time-labels">
          <span id="timeCurrent">0:00</span>
          <span id="timeTotal">0:00</span>
        </div>
      </div>
      
      <div class="control-buttons">
        <button class="ctrl-btn" onclick="prevTrack()" title="Önceki">⏮</button>
        <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Sonraki">⏭</button>
      </div>
    </div>
  </div>

  <!-- SURE LİSTESİ -->
  <div class="sureler-section">
    <div class="sureler-header">
      <span>⟡ 114 SURE ⟡</span>
      <span id="totalInfo">114</span>
    </div>
    <div class="track-list" id="trackList"></div>
  </div>
  
  <!-- ALT YAZI DEĞİŞTİ: NÖTRON NEON yerine KURAN-I KERİM TÜRKÇE MEALİ -->
  <div class="glow-text">◈ KURAN-I KERİM TÜRKÇE MEALİ ◈</div>
</div>

<audio id="audio" preload="none"></audio>

  // ===========================================
  // OYNATICI DEĞİŞKENLERİ
  // ===========================================
  const audio = document.getElementById('audio');
  let tracks = SURE_LISTESI;
  let currentIdx = -1;
  let isPlaying = false;
  let trackInterval = null;
  let isLoading = false; // Yükleme durumu için değişken
  let loadingInterval = null; // Yükleme progress bar'ı için interval

  const SESSION_KEY = 'sureler_session_v12_neon';

  // ===========================================
  // YARDIMCI FONKSİYONLAR
  // ===========================================
  function saveSession() {
    if (!tracks.length || currentIdx < 0) return;
    
    const session = {
      currentIdx: currentIdx,
      currentTime: audio.currentTime,
      isPlaying: isPlaying
    };
    try {
      localStorage.setItem(SESSION_KEY, JSON.stringify(session));
    } catch (e) {}
  }

  function loadSession() {
    try {
      const session = JSON.parse(localStorage.getItem(SESSION_KEY));
      return session;
    } catch {
      return null;
    }
  }

  function formatSec(s) {
    s = Math.floor(s);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2,'0');
  }

  // Yükleme progress bar'ını güncelleme fonksiyonu
  function updateLoadingProgress(percent) {
    const activeItem = document.querySelector('.track-item.active');
    if (!activeItem) return;
    
    let progressBar = activeItem.querySelector('.track-progress-bar');
    if (!progressBar) {
      progressBar = document.createElement('div');
      progressBar.className = 'track-progress-bar';
      activeItem.appendChild(progressBar);
    }
    progressBar.style.width = percent + '%';
    
    // İkonu loading yap
    const icon = activeItem.querySelector('.track-icon');
    if (icon) {
      icon.classList.add('loading');
      icon.textContent = '⟳'; // Dönen ok
    }
  }

  // Yükleme simülasyonu (gerçek yükleme olmadığı için)
  function simulateTrackLoading() {
    if (loadingInterval) clearInterval(loadingInterval);
    
    isLoading = true;
    let progress = 0;
    
    // Progress bar'ı sıfırla
    updateLoadingProgress(0);
    
    loadingInterval = setInterval(() => {
      if (!isLoading) {
        clearInterval(loadingInterval);
        loadingInterval = null;
        return;
      }
      
      progress += 2; // Her 50ms'de %2 artış (toplam ~2.5 saniye)
      if (progress >= 100) {
        progress = 100;
        updateLoadingProgress(100);
        clearInterval(loadingInterval);
        loadingInterval = null;
        isLoading = false;
        
        // Yükleme tamamlandı, ikonu normale döndür
        const activeItem = document.querySelector('.track-item.active');
        if (activeItem) {
          const icon = activeItem.querySelector('.track-icon');
          if (icon) {
            icon.classList.remove('loading');
            icon.textContent = '▶';
          }
        }
      } else {
        updateLoadingProgress(progress);
      }
    }, 50); // 50ms'de bir güncelle
  }

  // Yüklemeyi iptal et
  function cancelLoading() {
    if (loadingInterval) {
      clearInterval(loadingInterval);
      loadingInterval = null;
    }
    isLoading = false;
    
    // Progress bar'ı kaldır ve ikonu düzelt
    const activeItem = document.querySelector('.track-item.active');
    if (activeItem) {
      const progressBar = activeItem.querySelector('.track-progress-bar');
      if (progressBar) progressBar.remove();
      
      const icon = activeItem.querySelector('.track-icon');
      if (icon) {
        icon.classList.remove('loading');
        icon.textContent = '▶';
      }
    }
  }

  // ===========================================
  // LİSTELEME VE OYNATMA
  // ===========================================
  function renderList() {
    const list = document.getElementById('trackList');
    list.innerHTML = '';
    document.getElementById('totalInfo').textContent = tracks.length;

    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'track-item' + (i === currentIdx ? ' active' : '');
      item.id = 'track-' + i;
      item.onclick = () => { 
        // Eğer zaten yükleme yapılıyorsa iptal et
        cancelLoading();
        loadTrack(i); 
        playAudio(); 
      };
      
      item.innerHTML = `
        <span class="track-num">${t.no}</span>
        <span class="track-icon">▶</span>
        <span class="track-name">${t.name}</span>
      `;
      list.appendChild(item);
    });
  }

  function loadTrack(idx, startTime = 0) {
    stopTracking();
    
    // Eğer yükleme yapılıyorsa iptal et
    cancelLoading();
    
    currentIdx = idx;
    
    const t = tracks[idx];
    audio.src = t.url;
    audio.currentTime = startTime;
    document.getElementById('nowTitle').textContent = t.name;
    document.getElementById('nowMeta').textContent = t.no + ' / ' + tracks.length;
    renderList();
    
    const el = document.getElementById('track-' + idx);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    
    // Yükleme simülasyonunu başlat
    simulateTrackLoading();
    
    saveSession();
  }

  function playAudio() {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').innerHTML = '❚❚';
      document.getElementById('playingDot').classList.add('visible');
      startTracking();
      
      // Yükleme tamamlandı, ikon ve progress bar'ı düzelt
      cancelLoading();
      
      saveSession();
    }).catch((err) => {
      console.warn('Oynatılamıyor:', err);
      isPlaying = false;
      document.getElementById('playBtn').innerHTML = '▶';
    });
  }

  function pauseAudio() {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '▶';
    document.getElementById('playingDot').classList.remove('visible');
    stopTracking();
    
    // Yüklemeyi iptal et (eğer devam ediyorsa)
    cancelLoading();
    
    saveSession();
  }

  function togglePlay() {
    if (currentIdx < 0) return;
    isPlaying ? pauseAudio() : playAudio();
  }

  function prevTrack() {
    if (currentIdx > 0) { 
      cancelLoading();
      loadTrack(currentIdx - 1); 
      playAudio(); 
    }
  }

  function nextTrack() {
    if (currentIdx < tracks.length - 1) { 
      cancelLoading();
      loadTrack(currentIdx + 1); 
      playAudio(); 
    }
  }

  // ===========================================
  // OYNATICI İZLEME
  // ===========================================
  function startTracking() {
    stopTracking();
    trackInterval = setInterval(() => {
      if (!audio.paused) {
        if (Math.floor(audio.currentTime) % 5 === 0) {
          saveSession();
        }
      }
    }, 1000);
  }

  function stopTracking() {
    if (trackInterval) { clearInterval(trackInterval); trackInterval = null; }
  }

  // ===========================================
  // OLAY DİNLEYİCİLER
  // ===========================================
  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCurrent').textContent = formatSec(Math.floor(audio.currentTime));
    document.getElementById('timeTotal').textContent = formatSec(Math.floor(audio.duration));
  });

  document.getElementById('progressContainer').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
    saveSession();
  });

  audio.addEventListener('ended', () => {
    stopTracking();
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '▶';
    document.getElementById('playingDot').classList.remove('visible');
    
    // Yüklemeyi iptal et
    cancelLoading();
    
    if (currentIdx < tracks.length - 1) {
      loadTrack(currentIdx + 1);
      playAudio();
    } else {
      saveSession();
    }
  });

  audio.addEventListener('canplay', () => {
    // Ses yüklenmeye hazır olduğunda yükleme simülasyonunu bitir
    cancelLoading();
  });

  window.addEventListener('beforeunload', () => {
    saveSession();
  });

  // ===========================================
  // KLAVYE KONTROLLERİ (sağ/sol ok tuşları ile ileri/geri sar)
  // ===========================================
  window.addEventListener('keydown', (e) => {
    // Sadece sağ ve sol ok tuşları için
    if (e.key === 'ArrowRight') {
      e.preventDefault(); // Sayfanın kaymasını engelle
      if (audio.duration) {
        audio.currentTime = Math.min(audio.currentTime + 5, audio.duration);
      }
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault(); // Sayfanın kaymasını engelle
      if (audio.duration) {
        audio.currentTime = Math.max(audio.currentTime - 5, 0);
      }
    }
  });

  // ===========================================
  // BAŞLANGIÇ
  // ===========================================
  // Oturumu yükle veya ilk sureye başla
  const session = loadSession();
  if (session && session.currentIdx !== undefined && session.currentIdx >= 0 && session.currentIdx < tracks.length) {
    loadTrack(session.currentIdx, session.currentTime || 0);
    if (session.isPlaying) {
      setTimeout(() => playAudio(), 100);
    }
  } else {
    loadTrack(0);
  }

  // Global fonksiyonlar
  window.prevTrack = prevTrack;
  window.nextTrack = nextTrack;
  window.togglePlay = togglePlay;

})();
