<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuran-ı Kerim Türkçe Meali · Nöro-Neon</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap');

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    background: #030014;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 12px;
    position: relative;
    overflow: hidden;
  }

  /* Nöro-cyber arkaplan */
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(circle at 30% 40%, rgba(0, 255, 200, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 70% 60%, rgba(150, 0, 255, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 10% 80%, rgba(0, 200, 255, 0.1) 0%, transparent 45%),
      repeating-linear-gradient(45deg, rgba(0, 255, 200, 0.03) 0px, rgba(0, 255, 200, 0.03) 1px, transparent 1px, transparent 20px);
    z-index: 0;
  }

  body::after {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background-image: 
      radial-gradient(circle at 20px 20px, rgba(0, 255, 255, 0.2) 1px, transparent 1px),
      radial-gradient(circle at 40px 60px, rgba(150, 0, 255, 0.2) 1px, transparent 1px),
      radial-gradient(circle at 80px 120px, rgba(0, 200, 255, 0.2) 1px, transparent 1px);
    background-size: 100px 100px;
    opacity: 0.5;
    pointer-events: none;
    z-index: 0;
    animation: particleFloat 20s linear infinite;
  }

  @keyframes particleFloat {
    0% { background-position: 0 0; }
    100% { background-position: 100px 100px; }
  }

  .container {
    max-width: 380px;
    width: 100%;
    background: rgba(5, 2, 20, 0.6);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-radius: 32px;
    border: 1px solid rgba(0, 255, 200, 0.4);
    box-shadow: 
      0 30px 60px rgba(0, 0, 0, 0.8),
      0 0 0 1px rgba(0, 255, 200, 0.2) inset,
      0 0 60px rgba(0, 255, 200, 0.3),
      0 0 100px rgba(150, 0, 255, 0.2);
    padding: 10px;
    position: relative;
    z-index: 2;
    transition: all 0.3s ease;
  }

  .container:hover {
    border-color: rgba(0, 255, 200, 0.8);
    box-shadow: 
      0 30px 70px rgba(0, 0, 0, 0.9),
      0 0 0 2px rgba(0, 255, 200, 0.3) inset,
      0 0 80px rgba(0, 255, 200, 0.5),
      0 0 120px rgba(150, 0, 255, 0.4);
    transform: scale(1.01);
  }

  .title-section {
    text-align: center;
    margin-bottom: 10px;
    position: relative;
    min-height: 100px;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .bismillah-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .bismillah-arabic {
    font-size: 2rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: rgba(220, 240, 255, 0.9);
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
    direction: rtl;
    unicode-bidi: bidi-override;
    transition: all 0.1s;
  }

  .bismillah-latin {
    font-size: 1.1rem;
    background: linear-gradient(135deg, #fff, #a0f, #0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
    font-weight: 500;
    direction: ltr;
  }

  .neuro-signature {
    font-size: 0.55rem;
    color: rgba(0, 255, 200, 0.6);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-top: 4px;
    text-shadow: 0 0 10px #0ff;
  }

  .player-section {
    background: rgba(8, 4, 25, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(0, 255, 200, 0.3);
    border-radius: 24px;
    padding: 14px;
    margin-bottom: 10px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(0, 255, 200, 0.2);
  }

  .now-playing-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .track-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .playing-dot {
    width: 6px;
    height: 6px;
    background: #0ff;
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
    flex-shrink: 0;
    animation: neuroPulse 1.5s ease-in-out infinite;
  }

  .playing-dot.visible {
    display: inline-block;
  }

  @keyframes neuroPulse {
    0% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px #0ff; }
    50% { opacity: 0.5; transform: scale(1.3); box-shadow: 0 0 40px #f0f; }
    100% { opacity: 1; transform: scale(1); box-shadow: 0 0 20px #0ff; }
  }

  .now-playing-title {
    font-size: 1rem;
    background: linear-gradient(135deg, #fff, #a0f, #0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    letter-spacing: 0.02em;
  }

  .now-playing-meta {
    font-size: 0.65rem; /* hafif büyütüldü */
    color: #6cf;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    text-shadow: 0 0 10px #0ff, 0 0 20px #f0f;
  }

  .player-controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-area {
    flex: 1;
  }

  .progress-container {
    position: relative;
    height: 4px;
    background: rgba(0, 20, 30, 0.6);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 6px;
    overflow: hidden;
    border: 1px solid rgba(0, 255, 200, 0.2);
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0ff, #f0f, #0ff);
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
    position: relative;
    background-size: 200% 100%;
    animation: neuroWave 2s linear infinite;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: -2px;
    bottom: -2px;
    width: 3px;
    background: #fff;
    filter: blur(2px);
    box-shadow: 0 0 20px #fff, 0 0 40px #0ff;
  }

  @keyframes neuroWave {
    0% { background-position: 0% 0%; }
    100% { background-position: 200% 0%; }
  }

  /* ✅ İSTEK 1: süre yazıları 2 punto büyütüldü (eskiden ~0.6rem şimdi 0.9rem) */
  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.9rem;   /* 2 punto büyütme: 0.7rem → 0.9rem */
    color: #8cf;
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
    text-shadow: 0 0 8px #0ff;
    font-weight: 500;
  }

  .control-buttons {
    display: flex;
    align-items: center;
    gap: 4px;
  }

  .ctrl-btn {
    background: transparent;
    border: 1px solid rgba(0, 255, 200, 0.3);
    color: #8cf;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-size: 1rem;
    backdrop-filter: blur(5px);
    text-shadow: 0 0 10px #0ff;
  }

  .ctrl-btn:hover {
    color: #fff;
    border-color: #0ff;
    text-shadow: 0 0 20px #0ff, 0 0 40px #f0f;
    transform: scale(1.1) rotate(360deg);
    box-shadow: 0 0 30px rgba(0, 255, 200, 0.4);
  }

  .play-btn {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, rgba(0, 255, 200, 0.2), rgba(150, 0, 255, 0.2));
    border: 1px solid #0ff;
    font-size: 1.2rem;
  }

  .play-btn:hover {
    background: linear-gradient(135deg, rgba(0, 255, 200, 0.4), rgba(150, 0, 255, 0.4));
    transform: scale(1.1) rotate(0deg);
  }

  .sureler-section {
    background: rgba(5, 2, 18, 0.7);
    backdrop-filter: blur(15px);
    -webkit-backdrop-filter: blur(15px);
    border: 1px solid rgba(0, 255, 200, 0.25);
    border-radius: 24px;
    padding: 10px 8px;
    box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5), 0 0 30px rgba(150, 0, 255, 0.15);
  }

  .sureler-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 6px 4px 6px;
    color: #6cf;
    font-size: 0.65rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0, 255, 200, 0.3);
    margin-bottom: 6px;
    text-shadow: 0 0 10px #0ff;
  }

  .track-list {
    max-height: 180px;
    overflow-y: auto;
    padding-right: 2px;
  }

  .track-list::-webkit-scrollbar {
    width: 3px;
  }
  .track-list::-webkit-scrollbar-track {
    background: rgba(0, 255, 200, 0.1);
    border-radius: 2px;
  }
  .track-list::-webkit-scrollbar-thumb {
    background: linear-gradient(#0ff, #f0f);
    border-radius: 2px;
    box-shadow: 0 0 20px #0ff;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 6px;
    cursor: pointer;
    border-radius: 12px;
    transition: all 0.2s ease;
    font-size: 0.85rem;
    color: rgba(200, 220, 255, 0.8);
    border: 1px solid transparent;
    margin-bottom: 2px;
    position: relative;
    overflow: hidden;
    height: 28px;
  }

  .track-item::before {
    content: '';
    position: absolute;
    top: 0;
    left: -100%;
    width: 100%;
    height: 100%;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 200, 0.1), transparent);
    transition: left 0.5s ease;
    pointer-events: none;
  }

  .track-item:hover::before {
    left: 100%;
  }

  .track-progress-bar {
    position: absolute;
    bottom: 0;
    left: 0;
    height: 2px;
    width: 0%;
    background: linear-gradient(90deg, #0ff, #f0f);
    box-shadow: 0 0 15px #0ff;
    transition: width 0.1s linear;
    z-index: 1;
  }

  .track-item:hover {
    border-color: rgba(0, 255, 200, 0.5);
    transform: translateX(3px);
    background: rgba(0, 255, 200, 0.05);
  }

  .track-item.active {
    border-color: #0ff;
    background: rgba(0, 255, 200, 0.08);
  }

  .track-num {
    width: 26px;
    color: #6cf;
    font-size: 0.7rem;
    font-variant-numeric: tabular-nums;
    text-align: center;
    text-shadow: 0 0 8px #0ff;
    z-index: 2;
    position: relative;
    font-weight: 600;
  }

  .track-item.active .track-num {
    display: none;
  }

  .track-icon {
    width: 26px;
    color: #0ff;
    font-size: 0.7rem;
    display: none;
    text-shadow: 0 0 15px #0ff, 0 0 30px #f0f;
    z-index: 2;
    position: relative;
  }

  .track-item.active .track-icon {
    display: block;
  }

  .track-name {
    flex: 1;
    color: rgba(220, 240, 255, 0.9);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 0.85rem;
    z-index: 2;
    position: relative;
    letter-spacing: 0.02em;
  }

  .track-item.active .track-name {
    background: linear-gradient(135deg, #fff, #a0f, #0ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .neuro-footer {
    text-align: center;
    margin-top: 8px;
    font-size: 0.7rem;
    color: rgba(0, 255, 200, 0.6);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    text-shadow: 0 0 15px #0ff;
    position: relative;
    padding: 2px 0;
  }

  .neuro-footer span {
    background: linear-gradient(135deg, #0ff, #f0f);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    font-weight: 600;
  }

  .data-stream {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    pointer-events: none;
    z-index: 1;
    overflow: hidden;
  }

  .data-stream::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: repeating-linear-gradient(
      45deg,
      transparent,
      transparent 10px,
      rgba(0, 255, 200, 0.02) 10px,
      rgba(150, 0, 255, 0.02) 20px
    );
    animation: dataFlow 20s linear infinite;
    opacity: 0.5;
  }

  @keyframes dataFlow {
    0% { transform: translate(0, 0) rotate(0deg); }
    100% { transform: translate(20px, 20px) rotate(45deg); }
  }
</style>
</head>

  </div>

  <div class="sureler-section">

  <div class="neuro-footer">

</div>

  ];

  const audio = document.getElementById('audio');
  let tracks = SURE_LISTESI;
  let currentIdx = -1;
  let isPlaying = false;
  let trackInterval = null;
  let isLoading = false;
  let loadingInterval = null;

  const SESSION_KEY = 'sureler_session_neuro_v2';

  function saveSession() {
    if (!tracks.length || currentIdx < 0) return;
    const session = { currentIdx, currentTime: audio.currentTime, isPlaying };
    try { localStorage.setItem(SESSION_KEY, JSON.stringify(session)); } catch (e) {}
  }

  function loadSession() {
    try { return JSON.parse(localStorage.getItem(SESSION_KEY)); } catch { return null; }
  }

  function formatSec(s) {
    s = Math.floor(s);
    const m = Math.floor(s / 60);
    const sec = s % 60;
    return m + ':' + String(sec).padStart(2,'0');
  }

  function updateLoadingProgress(percent) {
    const activeItem = document.querySelector('.track-item.active');
    if (!activeItem) return;
    let progressBar = activeItem.querySelector('.track-progress-bar');
    if (!progressBar) {
      progressBar = document.createElement('div');
      progressBar.className = 'track-progress-bar';
      activeItem.appendChild(progressBar);
    }
    progressBar.style.width = percent + '%';
  }

  function simulateTrackLoading() {
    if (loadingInterval) clearInterval(loadingInterval);
    isLoading = true;
    let progress = 0;
    updateLoadingProgress(0);
    loadingInterval = setInterval(() => {
      if (!isLoading) {
        clearInterval(loadingInterval);
        loadingInterval = null;
        return;
      }
      progress += 2;
      if (progress >= 100) {
        progress = 100;
        updateLoadingProgress(100);
        clearInterval(loadingInterval);
        loadingInterval = null;
        isLoading = false;
      } else {
        updateLoadingProgress(progress);
      }
    }, 50);
  }

  function cancelLoading() {
    if (loadingInterval) {
      clearInterval(loadingInterval);
      loadingInterval = null;
    }
    isLoading = false;
    const activeItem = document.querySelector('.track-item.active');
    if (activeItem) {
      const progressBar = activeItem.querySelector('.track-progress-bar');
      if (progressBar) progressBar.remove();
    }
  }

  function renderList() {
    const list = document.getElementById('trackList');
    list.innerHTML = '';
    document.getElementById('totalInfo').textContent = tracks.length;
    tracks.forEach((t, i) => {
      const item = document.createElement('div');
      item.className = 'track-item' + (i === currentIdx ? ' active' : '');
      item.id = 'track-' + i;
      item.onclick = () => { cancelLoading(); loadTrack(i); playAudio(); };
      item.innerHTML = `
        <span class="track-num">${t.no}</span>
        <span class="track-icon">▶</span>
        <span class="track-name">${t.name}</span>
      `;
      list.appendChild(item);
    });
  }

  function loadTrack(idx, startTime = 0) {
    stopTracking();
    cancelLoading();
    currentIdx = idx;
    const t = tracks[idx];
    audio.src = t.url;
    audio.currentTime = startTime;
    document.getElementById('nowTitle').textContent = t.name;
    document.getElementById('nowMeta').textContent = t.no + ' / ' + tracks.length;
    renderList();
    const el = document.getElementById('track-' + idx);
    if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
    simulateTrackLoading();
    saveSession();
  }

  function playAudio() {
    audio.play().then(() => {
      isPlaying = true;
      document.getElementById('playBtn').innerHTML = '❚❚';
      document.getElementById('playingDot').classList.add('visible');
      startTracking();
      cancelLoading();
      saveSession();
    }).catch((err) => {
      console.warn('Oynatılamıyor:', err);
      isPlaying = false;
      document.getElementById('playBtn').innerHTML = '▶';
    });
  }

  function pauseAudio() {
    audio.pause();
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '▶';
    document.getElementById('playingDot').classList.remove('visible');
    stopTracking();
    cancelLoading();
    saveSession();
  }

  function togglePlay() {
    if (currentIdx < 0) return;
    isPlaying ? pauseAudio() : playAudio();
  }

  function prevTrack() {
    if (currentIdx > 0) { cancelLoading(); loadTrack(currentIdx - 1); playAudio(); }
  }

  function nextTrack() {
    if (currentIdx < tracks.length - 1) { cancelLoading(); loadTrack(currentIdx + 1); playAudio(); }
  }

  function startTracking() {
    stopTracking();
    trackInterval = setInterval(() => {
      if (!audio.paused && Math.floor(audio.currentTime) % 5 === 0) saveSession();
    }, 1000);
  }

  function stopTracking() {
    if (trackInterval) { clearInterval(trackInterval); trackInterval = null; }
  }

  audio.addEventListener('timeupdate', () => {
    if (!audio.duration) return;
    const pct = (audio.currentTime / audio.duration) * 100;
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('timeCurrent').textContent = formatSec(Math.floor(audio.currentTime));
    document.getElementById('timeTotal').textContent = formatSec(Math.floor(audio.duration));
  });

  document.getElementById('progressContainer').addEventListener('click', function(e) {
    const rect = this.getBoundingClientRect();
    const pct = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
    saveSession();
  });

  audio.addEventListener('ended', () => {
    stopTracking();
    isPlaying = false;
    document.getElementById('playBtn').innerHTML = '▶';
    document.getElementById('playingDot').classList.remove('visible');
    cancelLoading();
    if (currentIdx < tracks.length - 1) {
      loadTrack(currentIdx + 1);
      playAudio();
    } else {
      saveSession();
    }
  });

  audio.addEventListener('canplay', () => {
    cancelLoading();
  });

  window.addEventListener('beforeunload', saveSession);

  window.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') {
      e.preventDefault();
      if (audio.duration) audio.currentTime = Math.min(audio.currentTime + 5, audio.duration);
    } else if (e.key === 'ArrowLeft') {
      e.preventDefault();
      if (audio.duration) audio.currentTime = Math.max(audio.currentTime - 5, 0);
    }
  });

  const session = loadSession();
  if (session && session.currentIdx !== undefined && session.currentIdx >= 0 && session.currentIdx < tracks.length) {
    loadTrack(session.currentIdx, session.currentTime || 0);
    if (session.isPlaying) setTimeout(() => playAudio(), 100);
  } else {
    loadTrack(0);
  }

  window.prevTrack = prevTrack;
  window.nextTrack = nextTrack;
  window.togglePlay = togglePlay;

  // ---------- BESMELE HARF EFEKTİ (15sn periyod, RTL/LTR) ----------
  const arabicEl = document.getElementById('bismillahArabic');
  const latinEl = document.getElementById('bismillahLatin');

  function applyLetterGlow(element, reverseOrder = false) {
    if (!element) return;
    const originalText = element.innerText;
    const letters = originalText.split('');
    element.innerHTML = ''; // temizle
    letters.forEach((ch, idx) => {
      const span = document.createElement('span');
      span.textContent = ch;
      span.style.transition = 'text-shadow 0.15s ease, color 0.15s';
      span.style.color = 'inherit';
      element.appendChild(span);
    });

    const spans = element.querySelectorAll('span');
    let i = 0;
    function glowNext() {
      // önceki tüm sil
      spans.forEach(s => {
        s.style.color = '';
        s.style.textShadow = '';
      });
      if (i >= spans.length) {
        // döngü bitti, periyodu temizle
        return;
      }
      const index = reverseOrder ? spans.length - 1 - i : i;
      spans[index].style.color = '#ffffff';
      spans[index].style.textShadow = '0 0 20px #fff, 0 0 35px #0ff, 0 0 60px #f0f, 0 0 80px #ff0';
      i++;
      if (i < spans.length) {
        setTimeout(glowNext, 180); // harf geçiş hızı
      }
    }
    glowNext();
  }

  let besmeleInterval = setInterval(() => {
    // Arapça: sağdan sola etkisi için reverseOrder = true
    applyLetterGlow(arabicEl, false);
    // Latin: soldan sağa (normal) reverseOrder = false
    applyLetterGlow(latinEl, false);
  }, 15000); // 15 saniye

  // sayfa kapandığında interval temizliği (opsiyonel)
  window.addEventListener('beforeunload', function() {
    if (besmeleInterval) clearInterval(besmeleInterval);
  });

})();
