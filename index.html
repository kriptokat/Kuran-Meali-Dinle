<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kuran-ı Kerim Türkçe Meali</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Space+Grotesk:wght@300;400;500;600&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0f;
    font-family: 'Space Grotesk', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: absolute;
    width: 100%;
    height: 100%;
    background: 
      radial-gradient(circle at 20% 30%, rgba(0, 255, 255, 0.05) 0%, transparent 40%),
      radial-gradient(circle at 80% 70%, rgba(255, 0, 255, 0.05) 0%, transparent 40%),
      linear-gradient(135deg, transparent 0%, rgba(0, 255, 255, 0.02) 100%);
    pointer-events: none;
  }

  .container {
    max-width: 520px;
    width: 100%;
    background: rgba(20, 20, 30, 0.6);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-radius: 32px;
    border: 1px solid rgba(0, 255, 255, 0.2);
    box-shadow: 
      0 20px 40px rgba(0, 0, 0, 0.6),
      0 0 0 1px rgba(0, 255, 255, 0.1),
      0 0 20px rgba(0, 255, 255, 0.2);
    padding: 24px;
    position: relative;
    z-index: 1;
  }

  .title-section {
    text-align: center;
    margin-bottom: 24px;
    position: relative;
  }

  .title-section::after {
    content: '';
    position: absolute;
    bottom: -8px;
    left: 20%;
    right: 20%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.5), transparent);
  }

  .bismillah {
    font-family: 'Amiri', serif;
    font-size: 1.6rem;
    color: #fff;
    text-shadow: 
      0 0 10px rgba(0, 255, 255, 0.5),
      0 0 20px rgba(0, 255, 255, 0.3);
    margin-bottom: 4px;
    letter-spacing: 0.02em;
  }

  h1 {
    font-size: 1rem;
    font-weight: 400;
    color: rgba(255, 255, 255, 0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    text-shadow: 0 0 5px rgba(0, 255, 255, 0.3);
  }

  .player-section {
    background: rgba(10, 10, 18, 0.8);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(0, 255, 255, 0.25);
    border-radius: 28px;
    padding: 14px 18px;
    margin-bottom: 16px;
    box-shadow: 
      0 8px 20px rgba(0, 0, 0, 0.5),
      0 0 0 1px rgba(0, 255, 255, 0.2),
      inset 0 0 20px rgba(0, 255, 255, 0.1);
  }

  .now-playing-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 10px;
  }

  .track-info {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .playing-dot {
    width: 6px;
    height: 6px;
    background: #0ff;
    border-radius: 50%;
    display: none;
    box-shadow: 0 0 12px #0ff, 0 0 20px #0ff;
    flex-shrink: 0;
    animation: pulse 1.2s ease-in-out infinite;
  }

  .playing-dot.visible {
    display: inline-block;
  }

  .now-playing-title {
    font-size: 0.95rem;
    color: #fff;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
    letter-spacing: 0.02em;
  }

  .now-playing-meta {
    font-size: 0.6rem;
    color: rgba(0, 255, 255, 0.6);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    flex-shrink: 0;
  }

  .player-controls-row {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .progress-area {
    flex: 1;
  }

  .progress-container {
    position: relative;
    height: 3px;
    background: rgba(255, 255, 255, 0.1);
    border-radius: 2px;
    cursor: pointer;
    margin-bottom: 4px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #0ff, #f0f);
    width: 0%;
    transition: width 0.1s linear;
    box-shadow: 0 0 10px #0ff;
    position: relative;
  }

  .progress-fill::after {
    content: '';
    position: absolute;
    right: 0;
    top: 0;
    bottom: 0;
    width: 3px;
    background: #fff;
    box-shadow: 0 0 10px #fff;
  }

  .time-labels {
    display: flex;
    justify-content: space-between;
    font-size: 0.55rem;
    color: rgba(0, 255, 255, 0.5);
    font-variant-numeric: tabular-nums;
    letter-spacing: 0.05em;
  }

  .control-buttons {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .ctrl-btn {
    background: rgba(0, 255, 255, 0.05);
    border: 1px solid rgba(0, 255, 255, 0.2);
    color: rgba(255, 255, 255, 0.7);
    width: 28px;
    height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 0.7rem;
    backdrop-filter: blur(4px);
  }

  .ctrl-btn:hover {
    background: rgba(0, 255, 255, 0.2);
    border-color: #0ff;
    color: #fff;
    box-shadow: 0 0 15px #0ff;
    transform: scale(1.05);
  }

  .play-btn {
    width: 34px;
    height: 34px;
    background: rgba(0, 255, 255, 0.15);
    border-color: #0ff;
    color: #fff;
    font-size: 0.8rem;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
  }

  .play-btn:hover {
    background: rgba(0, 255, 255, 0.3);
    box-shadow: 0 0 25px #0ff;
  }

  .shortcut-hint {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-top: 8px;
    font-size: 0.55rem;
    color: rgba(0, 255, 255, 0.4);
    letter-spacing: 0.05em;
  }

  .shortcut-hint span {
    background: rgba(0, 255, 255, 0.1);
    padding: 2px 8px;
    border-radius: 12px;
    border: 1px solid rgba(0, 255, 255, 0.2);
  }

  .sureler-section {
    background: rgba(10, 10, 18, 0.7);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 1px solid rgba(0, 255, 255, 0.2);
    border-radius: 24px;
    padding: 12px;
    box-shadow: 
      0 8px 20px rgba(0, 0, 0, 0.4),
      inset 0 0 30px rgba(0, 255, 255, 0.05);
  }

  .sureler-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px 8px 8px;
    color: rgba(0, 255, 255, 0.6);
    font-size: 0.6rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(0, 255, 255, 0.15);
    margin-bottom: 8px;
  }

  .track-list {
    max-height: 240px;
    overflow-y: auto;
    padding-right: 4px;
  }

  .track-list::-webkit-scrollbar {
    width: 2px;
  }
  .track-list::-webkit-scrollbar-track {
    background: rgba(0, 255, 255, 0.05);
  }
  .track-list::-webkit-scrollbar-thumb {
    background: rgba(0, 255, 255, 0.3);
    border-radius: 2px;
  }

  .track-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    cursor: pointer;
    border-radius: 16px;
    transition: all 0.2s ease;
    font-size: 0.85rem;
    color: rgba(255, 255, 255, 0.8);
    border: 1px solid transparent;
  }

  .track-item:hover {
    background: rgba(0, 255, 255, 0.05);
    border-color: rgba(0, 255, 255, 0.2);
  }

  .track-item.active {
    background: rgba(0, 255, 255, 0.1);
    border-color: #0ff;
    box-shadow: 0 0 15px rgba(0, 255, 255, 0.2);
  }

  .track-num {
    width: 22px;
    color: rgba(0, 255, 255, 0.4);
    font-size: 0.7rem;
    font-variant-numeric: tabular-nums;
    text-align: center;
  }

  .track-item.active .track-num {
    display: none;
  }

  .track-icon {
    width: 22px;
    color: #0ff;
    font-size: 0.6rem;
    display: none;
    text-shadow: 0 0 8px #0ff;
  }

  .track-item.active .track-icon {
    display: block;
  }

  .track-name {
    flex: 1;
    color: rgba(255, 255, 255, 0.9);
    font-weight: 400;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    font-size: 0.85rem;
  }

  .track-item.active .track-name {
    color: #fff;
    text-shadow: 0 0 8px #0ff;
  }

  .track-plays {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 0.8rem;
    color: rgba(0, 255, 255, 0.8);
    min-width: 36px;
    justify-content: flex-end;
    text-shadow: 0 0 8px rgba(0, 255, 255, 0.5);
  }

  .repeat-icon {
    font-size: 0.75rem;
    color: rgba(0, 255, 255, 0.6);
  }

  .play-count {
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 40px 20px;
    color: rgba(255, 255, 255, 0.5);
    background: rgba(10, 10, 18, 0.7);
    backdrop-filter: blur(8px);
    border-radius: 24px;
    border: 1px solid rgba(0, 255, 255, 0.2);
    display: none;
  }

  .empty-state.visible {
    display: block;
  }

  .empty-state-icon {
    font-size: 2rem;
    margin-bottom: 10px;
    opacity: 0.3;
    filter: drop-shadow(0 0 10px #0ff);
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.3; transform: scale(0.8); }
  }

  .hidden {
    display: none;
  }
</style>
</head>
<body>

<div class="container">
  <div class="title-section">
    <div class="bismillah">بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ</div>
    <h1>Kuran-ı Kerim Türkçe Meali</h1>
  </div>

  <div id="mainContent">
    <div class="player-section">
      <div class="now-playing-row">
        <div class="track-info">
          <span class="playing-dot" id="playingDot"></span>
          <div class="now-playing-title" id="nowTitle">—</div>
        </div>
        <div class="now-playing-meta" id="nowMeta"></div>
      </div>

      <div class="player-controls-row">
        <div class="progress-area">
          <div class="progress-container" id="progressContainer">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="time-labels">
            <span id="timeCurrent">0:00</span>
            <span id="timeTotal">0:00</span>
          </div>
        </div>
        
        <div class="control-buttons">
          <button class="ctrl-btn" onclick="prevTrack()" title="Önceki sure (←)">⏮</button>
          <button class="ctrl-btn play-btn" id="playBtn" onclick="togglePlay()">▶</button>
          <button class="ctrl-btn" onclick="nextTrack()" title="Sonraki sure (→)">⏭</button>
        </div>
      </div>
      
      <div class="shortcut-hint">
        <span>← 5sn geri</span>
        <span>→ 5sn ileri</span>
      </div>
    </div>

    <div class="sureler-section">
      <div class="sureler-header">
        <span>⟡ SURELER ⟡</span>
        <span id="totalInfo"></span>
      </div>
      <div class="track-list" id="trackList"></div>
    </div>
  </div>

  <div class="empty-state" id="emptyState">
    <div class="empty-state-icon">⟡</div>
    <p>Sureler bulunamadı. Lütfen /sureler/ klasörüne MP3 dosyaları yükleyin.</p>
  </div>
</div>

<audio id="audio"></audio>

<script>
const audio = document.getElementById('audio');
let tracks = [];
let currentIdx = -1;
let stats = {};
let isPlaying = false;
let trackInterval = null;
let currentTrackPlayed = false;
let isManualNavigation = false;

const STORAGE_KEY = 'sureler_stats_v13';
const SESSION_KEY = 'sureler_session_v9';

function seekForward() {
  if (currentIdx < 0 || !audio.duration) return;
  audio.currentTime = Math.min(audio.currentTime + 5, audio.duration);
  saveSession();
}

function seekBackward() {
  if (currentIdx < 0 || !audio.duration) return;
  audio.currentTime = Math.max(audio.currentTime - 5, 0);
  saveSession();
}

document.addEventListener('keydown', function(e) {
  if (currentIdx < 0) return;
  const activeElement = document.activeElement;
  const isInputActive = activeElement && (activeElement.tagName === 'INPUT' || activeElement.tagName === 'BUTTON');
  if (!isInputActive) {
    if (e.key === 'ArrowLeft') {
      e.preventDefault();
      seekBackward();
    } else if (e.key === 'ArrowRight') {
      e.preventDefault();
      seekForward();
    }
  }
});

function loadStats() {
  try { stats = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { stats = {}; }
}
function saveStats() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(stats)); } catch {}
}
function ensureStat(name) {
  if (!stats[name]) stats[name] = { plays: 0, seconds: 0 };
}

function saveSession() {
  if (!tracks.length || currentIdx < 0) return;
  const session = {
    currentIdx: currentIdx,
    currentTime: audio.currentTime,
    isPlaying: isPlaying,
    currentTrackPlayed: currentTrackPlayed,
    tracks: tracks.map(t => t.name)
  };
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify(session));
  } catch (e) {}
}

function loadSession() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY));
  } catch {
    return null;
  }
}

function incrementPlayCount(trackName) {
  if (!trackName) return;
  ensureStat(trackName);
  stats[trackName].plays++;
  saveStats();
  renderList();
}

function cleanName(fn) {
  return fn.replace(/\.(mp3|m4a|ogg|wav|flac|aac)$/i, '').replace(/[-_]/g, ' ').trim();
}

async function loadTracksFromServer() {
  try {
    // Basit bir yöntem: Bilinen dosyaları manuel eklemek yerine,
    // sunucuda bir dizin listeleme yoksa, public/sureler/ klasöründeki dosyaları
    // listelemek için bir API olmalı. Şimdilik örnek dosya isimleri deneyelim.
    // Gerçek projede, sunucu tarafında sureler dizinini okuyup JSON dönen bir endpoint olmalı.
    // Bu örnekte, 114 sure olduğunu varsayıp 001.mp3'ten 114.mp3'e kadar deneyeceğiz.
    
    const sureAdlari = [
      "Fatiha", "Bakara", "Al-i İmran", "Nisa", "Maide", "Enam", "Araf", "Enfal", "Tevbe", "Yunus",
      "Hud", "Yusuf", "Rad", "İbrahim", "Hicr", "Nahl", "İsra", "Kehf", "Meryem", "Taha",
      "Enbiya", "Hac", "Müminun", "Nur", "Furkan", "Şuara", "Neml", "Kasas", "Ankebut", "Rum",
      "Lokman", "Secde", "Ahzab", "Sebe", "Fatır", "Yasin", "Saffat", "Sad", "Zümer", "Mümin",
      "Fussilet", "Şura", "Zuhruf", "Duhan", "Casiye", "Ahkaf", "Muhammed", "Fetih", "Hucurat", "Kaf",
      "Zariyat", "Tur", "Necm", "Kamer", "Rahman", "Vakıa", "Hadid", "Mücadele", "Haşr", "Mümtehine",
      "Saff", "Cuma", "Münafikun", "Tegabün", "Talak", "Tahrim", "Mülk", "Kalem", "Hakka", "Mearic",
      "Nuh", "Cin", "Müzzemmil", "Müddessir", "Kıyame", "İnsan", "Mürselat", "Nebe", "Naziat", "Abese",
      "Tekvir", "İnfitar", "Mutaffifin", "İnşikak", "Büruc", "Tarık", "Ala", "Gaşiye", "Fecr", "Beled",
      "Şems", "Leyl", "Duha", "İnşirah", "Tin", "Alak", "Kadir", "Beyyine", "Zilzal", "Adiyat",
      "Karia", "Tekasür", "Asr", "Hümeze", "Fil", "Kureyş", "Maun", "Kevser", "Kafirun", "Nasr",
      "Leheb", "İhlas", "Felak", "Nas"
    ];

    let loadedTracks = [];
    for (let i = 0; i < sureAdlari.length; i++) {
      const sureNo = (i + 1).toString().padStart(3, '0');
      const fileName = `${sureNo}.mp3`;
      const url = `/sureler/${fileName}`;
      
      // Varlık kontrolü yapmak için HEAD isteği atalım
      try {
        const response = await fetch(url, { method: 'HEAD' });
        if (response.ok) {
          loadedTracks.push({
            name: `${sureNo} - ${sureAdlari[i]}`,
            url: url,
            file: { name: fileName }
          });
        } else {
          console.warn(`${fileName} bulunamadı, atlanıyor.`);
        }
      } catch {
        console.warn(`${fileName} yüklenemedi.`);
      }
    }

    if (loadedTracks.length === 0) {
      document.getElementById('emptyState').classList.add('visible');
      document.getElementById('mainContent').classList.add('hidden');
      return;
    }

    tracks = loadedTracks;
    document.getElementById('emptyState').classList.remove('visible');
    document.getElementById('mainContent').classList.remove('hidden');
    
    renderList();
    
    const session = loadSession();
    if (session && session.tracks && session.tracks.length === tracks.length) {
      let sameFiles = true;
      for (let i = 0; i < tracks.length; i++) {
        if (tracks[i].name !== session.tracks[i]) {
          sameFiles = false;
          break;
        }
      }
      
      if (sameFiles && session.currentIdx >= 0 && session.currentIdx < tracks.length) {
        currentTrackPlayed = session.currentTrackPlayed || false;
        loadTrack(session.currentIdx, session.currentTime || 0);
        if (session.isPlaying) {
          setTimeout(() => playAudio(), 100);
        }
        return;
      }
    }
    
    currentTrackPlayed = false;
    loadTrack(0);
  } catch (error) {
    console.error('Sureler yüklenirken hata:', error);
    document.getElementById('emptyState').classList.add('visible');
    document.getElementById('mainContent').classList.add('hidden');
  }
}

function renderList() {
  const list = document.getElementById('trackList');
  list.innerHTML = '';
  document.getElementById('totalInfo').textContent = tracks.length;

  tracks.forEach((t, i) => {
    ensureStat(t.name);
    const s = stats[t.name];
    const item = document.createElement('div');
    item.className = 'track-item' + (i === currentIdx ? ' active' : '');
    item.id = 'track-' + i;
    item.onclick = () => { 
      if (i !== currentIdx && currentIdx >= 0 && !currentTrackPlayed) {
        incrementPlayCount(tracks[currentIdx].name);
      }
      loadTrack(i); 
      playAudio(); 
    };
    
    const playDisplay = s.plays > 0 ? 
      `<span class="repeat-icon">↻</span><span class="play-count">${s.plays}</span>` : 
      '';
    
    item.innerHTML = `
      <span class="track-num">${String(i + 1).padStart(2, '0')}</span>
      <span class="track-icon">▶</span>
      <span class="track-name">${t.name}</span>
      <span class="track-plays">${playDisplay}</span>
    `;
    list.appendChild(item);
  });
}

function loadTrack(idx, startTime = 0) {
  if (!isManualNavigation && currentIdx >= 0 && currentIdx !== idx && !currentTrackPlayed) {
    incrementPlayCount(tracks[currentIdx].name);
  }
  
  isManualNavigation = false;
  
  stopTracking();
  currentIdx = idx;
  currentTrackPlayed = false;
  
  const t = tracks[idx];
  audio.src = t.url;
  audio.currentTime = startTime;
  document.getElementById('nowTitle').textContent = t.name;
  document.getElementById('nowMeta').textContent = (idx + 1) + ' / ' + tracks.length;
  renderList();
  
  const el = document.getElementById('track-' + idx);
  if (el) el.scrollIntoView({block: 'nearest', behavior: 'smooth'});
  
  saveSession();
}

function playAudio() {
  audio.play().then(() => {
    isPlaying = true;
    document.getElementById('playBtn').innerHTML = '❚❚';
    document.getElementById('playingDot').classList.add('visible');
    startTracking();
    saveSession();
  }).catch(() => {});
}

function pauseAudio() {
  audio.pause();
  isPlaying = false;
  document.getElementById('playBtn').innerHTML = '▶';
  document.getElementById('playingDot').classList.remove('visible');
  stopTracking();
  saveSession();
}

function togglePlay() {
  if (currentIdx < 0) return;
  isPlaying ? pauseAudio() : playAudio();
}

function prevTrack() {
  if (currentIdx > 0) { 
    isManualNavigation = true;
    loadTrack(currentIdx - 1); 
    playAudio(); 
  }
}

function nextTrack() {
  if (currentIdx < tracks.length - 1) { 
    isManualNavigation = true;
    loadTrack(currentIdx + 1); 
    playAudio(); 
  }
}

function startTracking() {
  stopTracking();
  trackInterval = setInterval(() => {
    if (!audio.paused && tracks[currentIdx]) {
      ensureStat(tracks[currentIdx].name);
      stats[tracks[currentIdx].name].seconds++;
      saveStats();
      
      if (Math.floor(audio.currentTime) % 5 === 0) {
        saveSession();
      }
    }
  }, 1000);
}

function stopTracking() {
  if (trackInterval) { clearInterval(trackInterval); trackInterval = null; }
}

audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  
  const pct = (audio.currentTime / audio.duration) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('timeCurrent').textContent = formatSec(Math.floor(audio.currentTime));
  document.getElementById('timeTotal').textContent = formatSec(Math.floor(audio.duration));
});

document.getElementById('progressContainer').addEventListener('click', function(e) {
  const rect = this.getBoundingClientRect();
  const pct = (e.clientX - rect.left) / rect.width;
  audio.currentTime = pct * audio.duration;
  saveSession();
});

audio.addEventListener('ended', () => {
  stopTracking();
  isPlaying = false;
  document.getElementById('playBtn').innerHTML = '▶';
  document.getElementById('playingDot').classList.remove('visible');
  
  if (!currentTrackPlayed) {
    currentTrackPlayed = true;
    incrementPlayCount(tracks[currentIdx].name);
  }
  
  if (currentIdx < tracks.length - 1) {
    isManualNavigation = false;
    loadTrack(currentIdx + 1);
    playAudio();
  } else {
    saveSession();
  }
});

window.addEventListener('beforeunload', () => {
  saveSession();
});

function formatSec(s) {
  s = Math.floor(s);
  const m = Math.floor(s / 60);
  const sec = s % 60;
  return m + ':' + String(sec).padStart(2,'0');
}

loadStats();
loadTracksFromServer();
</script>
